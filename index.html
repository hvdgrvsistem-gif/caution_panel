    <title>Caution Panel - All-in-One</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --btn-bg: #ffffff;
            --btn-text: #000000;
            --accent: #ffcc00;
        }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ANA PANEL GÖRÜNÜMÜ */
        #main-view {
            display: grid;
            grid-template-columns: repeat(4, 85px); /* Mobilde sığması için küçültüldü */
            gap: 5px;
            padding: 10px;
            border: 3px solid #333;
            background: #000;
        }

        @media (min-width: 600px) {
            #main-view { grid-template-columns: repeat(4, 160px); gap: 8px; }
        }

        .btn {
            background-color: var(--btn-bg);
            color: var(--btn-text);
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-weight: bold;
            font-size: 9px;
            cursor: pointer;
            text-transform: uppercase;
            border: 1px solid #666;
        }

        @media (min-width: 600px) { .btn { height: 55px; font-size: 11px; } }

        .btn:active { background-color: var(--accent); }

        .spacer { visibility: hidden; }
        .separator { background: #000; border: none; position: relative; }
        .separator::after { content: ""; position: absolute; width: 80%; height: 2px; background: white; }

        /* DETAY SAYFASI GÖRÜNÜMÜ */
        #detail-view {
            display: none; /* Başlangıçta gizli */
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #1a1a1a;
            padding: 20px;
            box-sizing: border-box;
            flex-direction: column;
            align-items: center;
        }

        #detail-title { color: var(--accent); font-size: 24px; margin-bottom: 20px; text-align: center; }
        #detail-content { font-size: 18px; line-height: 1.6; max-width: 600px; }

        .back-btn {
            margin-top: auto;
            padding: 15px 40px;
            background: #444;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
        }
    </style>

    function openDetail(title) {
 
   const detailTitle = document.getElementById('detail-title');
    
const detailContent = document.getElementById('detail-content');

    
detailTitle.textContent = title;


    // Eğer tıklanan butonun ismi prosedürler listesinde varsa onu göster, 

    // yoksa varsayılan (DEFAULT) metni göster.
    
const icerik = prosedurler[title] || prosedurler["DEFAULT"];
    
detailContent.innerHTML = icerik;
    

    document.getElementById('main-view').style.display = 'none';
    
document.getElementById('detail-view').style.display = 'flex';
}

    function closeDetail() {
        detailView.style.display = 'none';
        mainView.style.display = 'grid';
